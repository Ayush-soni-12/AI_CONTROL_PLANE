# Production Docker Compose — 2 FastAPI replicas + Nginx load balancer
# PostgreSQL → Supabase (managed)
# Redis      → Upstash  (managed)
# RabbitMQ   → CloudAMQP (managed)
version: '3.8'

services:

  # ─── Nginx Load Balancer ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl/origin.pem:/etc/ssl/certs/origin.pem:ro
      - ./nginx/ssl/origin-key.pem:/etc/ssl/private/origin-key.pem:ro
    depends_on:
      - control-plane-1
      - control-plane-2
    restart: unless-stopped

  # ─── Control Plane Replica 1 ──────────────────────────────────────
  control-plane-1:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: ai-control-plane-1
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SMTP_MAIL: ${SMTP_MAIL}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped

  # ─── Control Plane Replica 2 ──────────────────────────────────────
  control-plane-2:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: ai-control-plane-2
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      IS_CLOUD_MODE: ${IS_CLOUD_MODE}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_PRO_PLAN_ID: ${RAZORPAY_PRO_PLAN_ID}
      RAZORPAY_BUSINESS_PLAN_ID: ${RAZORPAY_BUSINESS_PLAN_ID}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SMTP_MAIL: ${SMTP_MAIL}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped
