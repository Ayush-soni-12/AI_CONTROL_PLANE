name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - "docker-compose.prod.yml"
      - "nginx/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Debug SSH Connection (IMPORTANT)
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script: |
            echo "✅ Connected to EC2"
            whoami
            hostname
            docker --version
            docker compose version

      # 🚀 Actual Deployment (Background Execution)
      - name: Deploy to EC2 via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          timeout: 60s
          script_stop: true
          script: |
            cd /home/ubuntu/AI_CONTROL_PLANE

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🚀 Starting deployment in background..."

            nohup bash -c '
              echo "📦 Pulling images..."
              docker compose -f docker-compose.prod.yml pull &&

              echo "🔨 Building & starting containers..."
              docker compose -f docker-compose.prod.yml up -d --build \
                --scale control-plane-1=1 \
                --scale control-plane-2=1 &&

              echo "🧹 Cleaning unused images..."
              docker image prune -f &&

              echo "📊 Final container status:"
              docker compose -f docker-compose.prod.yml ps
            ' > deploy.log 2>&1 &

            echo "✅ Deployment started successfully (running in background)"
            echo "📄 Check logs: tail -f deploy.log"