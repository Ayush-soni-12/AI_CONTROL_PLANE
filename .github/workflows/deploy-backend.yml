name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - "docker-compose.prod.yml"
      - "nginx/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Step 1: Test SSH Connection
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script: |
            echo "✅ Connected to EC2"
            whoami
            docker --version
            docker compose version

      # 🚀 Step 2: Background Deployment
      - name: Deploy in Background
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/AI_CONTROL_PLANE

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🚀 Starting deployment..."

            nohup bash -c '
              docker compose -f docker-compose.prod.yml down &&
              docker compose -f docker-compose.prod.yml up -d --build &&
              docker image prune -f
            ' > deploy.log 2>&1 &

      # ⏳ Step 3: Wait for App to Start
      - name: Wait for Deployment
        run: sleep 40

      # 🔍 Step 4: Verify Deployment (CRITICAL)
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/AI_CONTROL_PLANE

            echo "📊 Running containers:"
            docker ps

            echo "📄 Last 50 lines of logs:"
            tail -n 50 deploy.log

            echo "🌐 Checking health endpoint..."
            curl -f https://api.neuralcontrol.online/health || exit 1

            echo "✅ Deployment successful 🎉"