events {
    worker_connections 1024;
}

http {
    # ── Upstream: 3 control-plane replicas (round-robin by default) ───
    upstream control_plane {
        least_conn;  # Send to replica with fewest active connections
        server control-plane-1:8000;
        server control-plane-2:8000;
        server control-plane-3:8000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────
    server {
        listen 80;
        server_name api.neuralcontrol.online;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS with Cloudflare Origin Certificate ──────────────────────
    server {
        listen 443 ssl;
        server_name api.neuralcontrol.online;

        ssl_certificate     /etc/ssl/certs/origin.pem;
        ssl_certificate_key /etc/ssl/private/origin-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Proxy to load-balanced control-plane ──────────────────────
        location / {
            proxy_pass http://control_plane;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            # ── SSE: must disable buffering or events won't stream ─────
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         86400s;
            chunked_transfer_encoding  on;
        }
    }
}
